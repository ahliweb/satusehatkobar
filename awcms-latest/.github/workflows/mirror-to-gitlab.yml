name: Mirror to GitLab

on:
  push:
    branches: ["**"]
  delete:

jobs:
  mirror:
    name: Mirror to GitLab
    runs-on: ubuntu-latest
    if: github.repository == 'ahliweb/awcms-micro'
    permissions:
      contents: read
    env:
      GITLAB_USERNAME: ${{ vars.GITLAB_USERNAME || secrets.GITLAB_USERNAME }}
      GITLAB_REPO_NAME: ${{ vars.GITLAB_REPO_NAME || secrets.GITLAB_REPO_NAME }}
      GITLAB_PAT: ${{ secrets.GITLAB_PAT }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate GitLab mirror configuration
        id: mirror-config
        shell: bash
        run: |
          if [[ -z "$GITLAB_USERNAME" || -z "$GITLAB_REPO_NAME" || -z "$GITLAB_PAT" ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "GitLab mirror not configured; skipping mirror step."
            exit 0
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Mirror to GitLab
        if: steps.mirror-config.outputs.enabled == 'true'
        shell: bash
        run: |
          git remote add gitlab "https://oauth2:${GITLAB_PAT}@gitlab.com/${GITLAB_USERNAME}/${GITLAB_REPO_NAME}.git"
          git push --prune gitlab --all
          git push gitlab --tags
