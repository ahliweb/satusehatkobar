name: Backup on Database Changes

on:
  push:
    branches:
      - main
    paths:
      - 'awcmsmicro-dev/packages/core/src/database/migrations/**'
      - 'awcmsmicro-dev/packages/core/src/schema/**'
      - '.github/workflows/backup-on-db-changes.yml'
  workflow_dispatch:
    inputs:
      backup_type:
        description: 'Type of backup to run'
        required: true
        default: 'database'
        type: choice
        options:
          - database
          - full

permissions:
  contents: read

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '11.5.0'

jobs:
  backup-database:
    name: Backup D1 Database
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      D1_DATABASE_NAME: awcms-micro-d1-20260530
      R2_BUCKET_NAME: awcms-micro-backups
      BACKUP_PASSPHRASE: ${{ secrets.BACKUP_PASSPHRASE }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Backup D1 database
        run: bash scripts/backup/backup-db.sh --type d1 --name "$D1_DATABASE_NAME" --bucket "$R2_BUCKET_NAME" --keep 7

  notify:
    name: Notify Result
    runs-on: ubuntu-latest
    needs: [backup-database]
    if: always()

    steps:
      - name: Check backup status
        run: |
          if [ "${{ needs.backup-database.result }}" = "success" ]; then
            echo "✅ Database backup completed successfully"
          else
            echo "❌ Database backup failed - check logs"
            exit 1
          fi
