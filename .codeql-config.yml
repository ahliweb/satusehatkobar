# CodeQL configuration for ahliweb/awcms-micro
# https://docs.github.com/en/code-security/code-scanning/creating-an-advanced-setup-for-code-scanning/customizing-your-advanced-setup-for-code-scanning#using-a-custom-configuration-file

# Exclude the emdash-latest/ directory from CodeQL analysis.
#
# emdash-latest/ is a read-only upstream snapshot of the EmDash CMS project
# (https://github.com/emdash-cms/emdash). It is kept in this repository
# for reference and synchronisation purposes only. It is never deployed or
# executed as part of AWCMS-Micro itself.
#
# Any vulnerabilities found in emdash-latest/ belong to the upstream project
# and should be reported there. Tracking them here creates noise and prevents
# the security tab from reflecting the actual state of AWCMS-Micro code.
paths-ignore:
  - emdash-latest
