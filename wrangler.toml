name = "awcms-sskkobar-worker"
main = "awcmsmicro-dev/templates/awcms-sskobar-cloudflare/src/worker.ts"
compatibility_date = "2026-05-14"
compatibility_flags = ["nodejs_compat"]

[placement]
mode = "smart"

# Development D1 database
[[d1_databases]]
binding = "DB"
database_name = "awcms-sskkobar-d1"
database_id = ""
migrations_dir = "awcmsmicro-dev/packages/core/src/database/migrations"

# Development R2 bucket for media storage
[[r2_buckets]]
binding = "MEDIA"
bucket_name = "awcms-sskkobar-r2"

# Development KV namespace for sessions
[[kv_namespaces]]
binding = "SESSION"
id = ""

# Cloudflare Images binding
[images]
binding = "IMAGES"

# Worker loaders
[[worker_loaders]]
binding = "LOADER"

# Environment variables
[vars]
AWCMS_MICRO_SITE_URL = "https://awcms-sskobar.ahlikoding.com"
AWCMS_MICRO_STORAGE_PUBLIC_BASE_URL = "https://awcms-sskobar-s3.ahlikoding.com"
AWCMS_MICRO_GALLERY_MEDIA_STORAGE = "r2"
AWCMS_MICRO_GALLERY_CLOUDFLARE_IMAGES = "optional"
AWCMS_MICRO_GALLERY_CLOUDFLARE_STREAM = "optional"

# Observability
[observability]
enabled = true

# Development settings
[dev]
port = 8787
local_protocol = "http"
