name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NODE_VERSION: ${{ vars.GITHUB_ACTION_NODE_VERSION || '22' }}
      PNPM_VERSION: ${{ vars.GITHUB_ACTION_PNPM_VERSION || '11.1.3' }}
      WORKER_PACKAGE: ${{ vars.GITHUB_ACTION_WORKER_TEMPLATE_PACKAGE || '@awcms-micro/template-default-cloudflare' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: awcmsmicro-dev/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: awcmsmicro-dev

      - name: Build packages
        run: pnpm build
        working-directory: awcmsmicro-dev

      - name: Build Cloudflare Template
        run: pnpm --filter "$WORKER_PACKAGE" build
        working-directory: awcmsmicro-dev

      - name: Deploy to Cloudflare Workers
        run: pnpm --filter "$WORKER_PACKAGE" exec wrangler deploy
        working-directory: awcmsmicro-dev
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_DEPLOY_TOKEN || secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
